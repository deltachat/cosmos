name: Deploy main Branch

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest
    environment:
      name: "production"

    steps:
    - uses: GuillaumeFalourd/clone-github-repo-action@19817562c346ff60f9935158dede6c5ece8fd0ac  # v2.3
      with:
        owner: 'deltachat'
        repository: 'cosmos'
    - name: Upload
      run: |
        mkdir -p "$HOME/.ssh"
        echo "${{ secrets.KEY }}" > "$HOME/.ssh/key"
        chmod 600 "$HOME/.ssh/key"
        rsync -rILvh -e "ssh -i $HOME/.ssh/key -o StrictHostKeyChecking=no" $GITHUB_WORKSPACE/cosmos/ "${{ secrets.USERNAME }}@cosmos.delta.chat:"
